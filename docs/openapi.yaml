openapi: 3.0.0
info:
  title: Leleka API
  version: 1.0.0
  description: >
    REST API для командного проєкту (Next + Node).
    Містить ендпоінти для автентифікації, користувачів, завдань, тижнів та щоденників.
servers:
  - url: https://project-1-back.onrender.com/api
    description: Production server
  - url: http://localhost:3000/api
    description: Local server

tags:
  - name: Auth
  - name: Users
  - name: Tasks
  - name: Diaries
  - name: Weeks

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: Register new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegister"
      responses:
        "201":
          description: User registered
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLogin"
      responses:
        "200":
          description: User logged in
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      summary: Logout user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: User logged out successfully
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      summary: Refresh user session
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Session refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Session refreshed
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me:
    get:
      summary: Get current user profile
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      summary: Update user profile
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                gender:
                  type: string
                  enum: [boy, girl, unknown]
                date:
                  type: string
                  format: date
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/me/avatar:
    patch:
      summary: Update user avatar
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: https://res.cloudinary.com/demo/image/upload/v123/avatar.png
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/me/theme:
    patch:
      summary: Update user theme
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                theme:
                  type: string
                  enum: [girl, boy, neutral]
      responses:
        "200":
          description: Theme updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  theme:
                    type: string
                    example: neutral
        "400":
          $ref: "#/components/responses/BadRequest"

  /tasks:
    get:
      summary: Get all tasks
      tags: [Tasks]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      summary: Create task
      tags: [Tasks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Task created
        "400":
          $ref: "#/components/responses/BadRequest"

  /tasks/{taskId}:
    patch:
      summary: Mark task as done / update status
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isDone:
                  type: boolean
                  example: true
      responses:
        "200":
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"

  /diaries:
    get:
      summary: Get all diaries
      tags: [Diaries]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of diaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Diary"
    post:
      summary: Create diary
      tags: [Diaries]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiaryCreate"
      responses:
        "201":
          description: Diary created
        "400":
          $ref: "#/components/responses/BadRequest"

  /diaries/{diaryId}:
    patch:
      summary: Update diary
      tags: [Diaries]
      security:
        - bearerAuth: []
      parameters:
        - name: diaryId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiaryUpdate"
      responses:
        "200":
          description: Diary updated
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete diary
      tags: [Diaries]
      security:
        - bearerAuth: []
      parameters:
        - name: diaryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Diary deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /weeks:
    get:
      summary: Get all weeks
      tags: [Weeks]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of weeks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Week"
    post:
      summary: Create week
      tags: [Weeks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeekCreate"
      responses:
        "201":
          description: Week created
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRegister:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
    UserLogin:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
    User:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string
        theme:
          type: string
    Task:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        isDone:
          type: boolean
    TaskCreate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
    Week:
      type: object
      properties:
        _id:
          type: string
        number:
          type: integer
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
    WeekCreate:
      type: object
      properties:
        number:
          type: integer
    Diary:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        date:
          type: string
        emotions:
          type: array
          items:
            $ref: "#/components/schemas/Emotion"
    DiaryCreate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        date:
          type: string
        emotions:
          type: array
          items:
            type: string
    DiaryUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        date:
          type: string
        emotions:
          type: array
          items:
            type: string
    Emotion:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        isActive:
          type: boolean

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
                example: 400
              message:
                type: string
                example: "Validation error"
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
                example: 401
              message:
                type: string
                example: "Unauthorized"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
                example: 404
              message:
                type: string
                example: "Diary not found"
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
                example: 500
              message:
                type: string
                example: "Internal server error"
